name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kernel:
    name: Kernel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv and Python 3.12
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.16"
          python-version: "3.12"
          enable-cache: true

      - name: Sync locked development environment
        run: uv sync --locked --extra dev

      - name: Check source quality
        run: |
          uv run ruff check src tests
          uv run mypy

      - name: Run Kernel tests
        run: uv run python -m unittest discover -s tests

      - name: Check CLI and build
        run: |
          uv run evopolicygym --version
          uv build

  cartpole:
    name: CartPole Benchmark (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv and Python 3.12
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.16"
          python-version: "3.12"
          enable-cache: true

      - name: Sync locked Benchmark environment
        run: >-
          uv sync
          --project environments/cartpole
          --locked
          --extra dev

      - name: Check and test external Benchmark
        working-directory: environments/cartpole
        run: |
          uv run ruff check src tests
          uv run mypy
          uv run python -m unittest discover -s tests
          uv build
