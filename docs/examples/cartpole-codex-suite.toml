[suite]
name = "cartpole-codex-calibration"
root = "runs"
repeats = 3
jobs = 1

[[run]]
env = "cartpole"
data = "docs/examples/data/cartpole"
key = "cartpole-codex-calibration"
model = "codex"
budget = 16
minimum = 1
maximum = 4
valid_size = 4
final_size = 4

[[agent]]
kind = "codex"
retries = 2
retry_backoff = 1.0
bypass = true

[server]
bind = "127.0.0.1"
port = 0
